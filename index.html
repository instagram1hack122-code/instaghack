<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Inspired Profile</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<body>

<div class="mobile">

    <!-- Header -->
    <div class="top-bar">

        <i class="fa-solid fa-arrow-left"></i>

        <h2>diya_prajapati_29</h2>

        <i class="fa-solid fa-ellipsis-vertical"></i>

    </div>

    <!-- Profile -->

    <div class="profile">

        <img src="profile.jpg" alt="Profile">

        <div class="profile-info">

            <div class="stats">

                <div>
                    <h3>1</h3>
                    <span>Posts</span>
                </div>

                <div>
                    <h3>1095</h3>
                    <span>Followers</span>
                </div>

                <div>
                    <h3>100</h3>
                    <span>Following</span>
                </div>

            </div>

        </div>

    </div>

    <!-- Bio -->

    <div class="bio">

        <h3>Diya Prajapati</h3>

        <p>👋 Hii!</p>

        <p>I am Diya</p>

        <p> Shahnagar, Panna, Madhya Pradesh</p>

    </div>

    <!-- Buttons -->

    <div class="buttons">

        <button>Follow</button>

        <button>Message</button>

        <button>Share Profile</button>

    </div>

    <!-- Navigation -->

    <div class="menu">

        <a href="profile.html">
            <i class="fa-solid fa-user"></i>
            <!-- Profile -->
        </a>
